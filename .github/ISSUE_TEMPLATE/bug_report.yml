name: Bug Report
description: 报告 bridge、控制台或运行流程中的问题
title: "[Bug] "
labels: [bug]
body:
  - type: textarea
    id: summary
    attributes:
      label: 问题描述
      description: 简要描述你遇到的问题
      placeholder: 例如：QQ 收到消息但 bot 无回复
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 请尽量写清楚触发过程
      placeholder: |
        1. 启动 bridge
        2. 在 QQ 发送消息
        3. 控制台显示 ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期望结果
      placeholder: 例如：bot 正常回复
  - type: textarea
    id: actual
    attributes:
      label: 实际结果
      placeholder: 例如：控制台报错 / QQ 无响应
  - type: textarea
    id: logs
    attributes:
      label: 日志或截图
      description: 请注意脱敏，不要贴 token 和 secret
  - type: input
    id: version
    attributes:
      label: 版本信息
      placeholder: 例如：v0.1.1
